name: Sync LoL Esports to Google Calendar

on:
  schedule:
    - cron: "*/15 * * * *"   # watchdog (best-effort) để (khởi động lại) vòng lặp
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  actions: write            # để tự kích hoạt lại (giữ vòng lặp 5 phút sống)

concurrency:
  group: sync-lol
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GCAL_ID: ${{ secrets.GCAL_ID }}
      GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
      LEAGUEPEDIA_USER: ${{ secrets.LEAGUEPEDIA_USER }}
      LEAGUEPEDIA_PASS: ${{ secrets.LEAGUEPEDIA_PASS }}
      FAVORITE_TEAMS: ${{ vars.FAVORITE_TEAMS }}
      LOL_YEAR: ${{ vars.LOL_YEAR }}
      LOL_PREFIXES: ${{ vars.LOL_PREFIXES }}
      LOL_EVENT_LEAGUES: ${{ vars.LOL_EVENT_LEAGUES }}
      LOL_FULL_LEAGUES: ${{ vars.LOL_FULL_LEAGUES }}
      LOL_LATE_ONLY: ${{ vars.LOL_LATE_ONLY }}
      LOL_EXTRA_PAGES: ${{ vars.LOL_EXTRA_PAGES }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests google-api-python-client google-auth

      - name: Hour key
        id: hk
        run: echo "h=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"
      - name: Restore schedule cache
        uses: actions/cache@v4
        with:
          path: _cache
          key: lol-schedule-${{ steps.hk.outputs.h }}

      - name: Warn if secrets missing
        if: ${{ env.GCAL_ID == '' || env.GOOGLE_SA_KEY == '' }}
        run: echo "::warning::GCAL_ID / GOOGLE_SA_KEY chưa cấu hình — bỏ qua sync. Xem README."

      # Sync ngay 1 lần, rồi lặp mỗi 5 phút trong ~55 phút NẾU đang có trận (live/±90').
      # Ngoài giờ trận thì thoát luôn cho đỡ tốn runner.
      - name: Sync loop (5-min cadence during matches)
        if: ${{ env.GCAL_ID != '' && env.GOOGLE_SA_KEY != '' }}
        run: |
          for i in $(seq 1 11); do
            python sync_gcal.py || true
            if ! python sync_gcal.py --check-active; then
              echo "Không có trận nào gần giờ — thoát vòng lặp."; exit 0
            fi
            echo "Đang trong khung giờ trận — chờ 5 phút (lần $i/11)."
            sleep 300
          done

      - name: Keep the loop alive
        if: ${{ env.GCAL_ID != '' && env.GOOGLE_SA_KEY != '' }}
        run: |
          if python sync_gcal.py --check-active; then
            gh workflow run "${GITHUB_WORKFLOW}" --ref main || true
          fi
